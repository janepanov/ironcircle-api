doctrine_mongodb:
    auto_generate_proxy_classes: true
    auto_generate_hydrator_classes: true
    connections:
        default:
            server: "%env(resolve:MONGODB_URI)%"
            options: {}
    default_database: "%env(resolve:MONGODB_DB)%"
    document_managers:
        default:
            auto_mapping: false
            mappings:
                User:
                    type: attribute
                    dir: "%kernel.project_dir%/src/User/Infrastructure/Doctrine/Document"
                    prefix: 'App\User\Infrastructure\Doctrine\Document'
                    is_bundle: false
                Circle:
                    type: attribute
                    dir: "%kernel.project_dir%/src/Circle/Infrastructure/Doctrine/Document"
                    prefix: 'App\Circle\Infrastructure\Doctrine\Document'
                    is_bundle: false
                Post:
                    type: attribute
                    dir: "%kernel.project_dir%/src/Post/Infrastructure/Doctrine/Document"
                    prefix: 'App\Post\Infrastructure\Doctrine\Document'
                    is_bundle: false
                Comment:
                    type: attribute
                    dir: "%kernel.project_dir%/src/Comment/Infrastructure/Doctrine/Document"
                    prefix: 'App\Comment\Infrastructure\Doctrine\Document'
                    is_bundle: false
                Vote:
                    type: attribute
                    dir: "%kernel.project_dir%/src/Vote/Infrastructure/Doctrine/Document"
                    prefix: 'App\Vote\Infrastructure\Doctrine\Document'
                    is_bundle: false

when@prod:
    doctrine_mongodb:
        auto_generate_proxy_classes: false
        auto_generate_hydrator_classes: false
        document_managers:
            default:
                metadata_cache_driver:
                    type: service
                    id: doctrine_mongodb.system_cache_pool

    framework:
        cache:
            pools:
                doctrine_mongodb.system_cache_pool:
                    adapter: cache.system
