framework:
    messenger:
        # Configure separate buses for Commands and Queries (CQRS)
        default_bus: command.bus

        buses:
            command.bus:
                middleware:
                    - validation
            query.bus:
                middleware:
                    - validation

        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        # failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            sync: "sync://"
            # async: '%env(MESSENGER_TRANSPORT_DSN)%'
            # failed: 'doctrine://default?queue_name=failed'

        routing:
            # Commands and Queries go through sync transport by default
            # Domain events can be routed to async transport later
            'App\Shared\Domain\Event\DomainEvent': sync

when@test:
    framework:
        messenger:
            transports:
                sync: "in-memory://"
